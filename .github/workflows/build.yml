name: Build

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.sh"
      - ".github/workflows/build.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "build.sh"
      - ".github/workflows/build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin
        run: |
          mkdir -p release
          cd src
          zip -r ../release/bob-plugin-urban-dictionary.bobplugin ./*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bob-plugin-urban-dictionary
          path: release/bob-plugin-urban-dictionary.bobplugin
